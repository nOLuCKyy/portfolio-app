          <div className="field">
            <label>{t.shares}</label>
            <input type="number" step="0.0001" value={shares} onChange={e => setShares(e.target.value)} placeholder="0.00"/>
          </div>
          <div className="field">
            <label>{t.price} (€)</label>
            <input type="number" step="0.01" value={price} onChange={e => setPrice(e.target.value)} placeholder="0.00"/>
          </div>
        </div>
        <div className="field">
          <label>{t.date}</label>
          <input type="date" value={date} onChange={e => setDate(e.target.value)}/>
        </div>
        <div className="field">
          <label>{t.note}</label>
          <input value={note} onChange={e => setNote(e.target.value)} placeholder="…"/>
        </div>
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 10 }}>
          <button className="btn-ghost" onClick={onClose}>{t.cancel}</button>
          <button className="btn-primary" onClick={() => onSave({ ticker, type, shares, price, date, note })}>
            <Icon name="check" size={14}/> {t.save}
          </button>
        </div>
      </div>
    </>
  );
};

Object.assign(window, { T, Sidebar, Hero, ChartCard, Holdings, AllocationCard, Movers, AssetPanel, AddTxModal });
</script>
<script type="text/babel">// Market view — browse all tracked assets with market-wide pct changes
const buildMarketRows = (data, builtRows) => {
  const ownedById = {};
  (builtRows || []).forEach(r => { ownedById[r.tid] = r; });
  const mp = data.marketPrices || {};
  const out = [];
  for (const t of data.tickers || []) {
    const m = mp[t.yahooSymbol];
    const fallback = data.prices?.[t.id];
    const price = (m && typeof m.price === "number") ? m.price : (typeof fallback === "number" ? fallback : null);
    if (price == null) continue;
    out.push({
      id: t.id,
      tid: t.id,
      symbol: t.symbol,
      name: t.name,
      type: t.type || "stock",
      yahooSymbol: t.yahooSymbol,
      price,
      dayPct: m?.dayPct ?? null,
      m1Pct:  m?.m1Pct  ?? null,
      ytdPct: m?.ytdPct ?? null,
      y1Pct:  m?.y1Pct  ?? null,
      owned: !!ownedById[t.id],
      ownedRow: ownedById[t.id] || null,
    });
  }
  return out;
};

const MarketView = ({ data, builtRows, lang, currency, eurusd, onSelect, onAdd }) => {
  const t = T[lang];
  const fx = currency === "USD" ? eurusd : 1;
  const [query, setQuery] = React.useState("");
  const [filter, setFilter] = React.useState("all"); // all | mine | stock | etf | crypto
  const [sortKey, setSortKey] = React.useState("symbol");
  const [sortDir, setSortDir] = React.useState("asc");
  const [refreshing, setRefreshing] = React.useState(false);

  const all = React.useMemo(() => buildMarketRows(data, builtRows), [data, builtRows]);

  const rows = React.useMemo(() => {
    const q = query.trim().toLowerCase();
    let r = all;
    if (filter === "mine") r = r.filter(x => x.owned);
    else if (filter === "stock") r = r.filter(x => x.type === "stock");
    else if (filter === "etf") r = r.filter(x => x.type === "etf");
    else if (filter === "crypto") r = r.filter(x => x.type === "crypto");
    if (q) r = r.filter(x => x.symbol.toLowerCase().includes(q) || (x.name || "").toLowerCase().includes(q));
    const dir = sortDir === "asc" ? 1 : -1;
    return [...r].sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === "string") return dir * av.localeCompare(bv);
      return dir * (av - bv);
    });
  }, [all, query, filter, sortKey, sortDir]);

  const onSort = k => {
    if (k === sortKey) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortKey(k); setSortDir(k === "symbol" ? "asc" : "desc"); }
  };

  const head = (key, label, right = false) => (
    <th className={sortKey === key ? "sorted" : ""} style={{ textAlign: right ? "right" : "left" }} onClick={() => onSort(key)}>
      {label}
      <span className="arrow">{sortKey === key ? (sortDir === "asc" ? "↑" : "↓") : "↕"}</span>
    </th>
  );

  const filterChips = [
    { id: "mine",   label: t.myList },
    { id: "all",    label: t.allAssets },
    { id: "stock",  label: t.stocks },
    { id: "etf",    label: t.etfs },
    { id: "crypto", label: t.crypto },
  ];

  const handleRefresh = () => {
    setRefreshing(true);
    setTimeout(() => setRefreshing(false), 900);
  };

  const pctCell = (v) => {
    if (v == null || isNaN(v)) return <span className="mono" style={{ color: "var(--fg-3)" }}>—</span>;
    const isUp = v >= 0;
    return (
      <span className={"pct-pill mono " + (isUp ? "up" : "down")}>
        {isUp ? "+" : ""}{v.toFixed(2)}%
      </span>
    );
  };

  return (
    <div>
      <div className="market-toolbar card">
        <div className="search" style={{ flex: "0 1 320px", minWidth: 200 }}>
          <Icon name="search" size={14}/>
          <input placeholder={t.marketSearch} value={query} onChange={e => setQuery(e.target.value)}/>
        </div>
        <div className="market-chips">
          {filterChips.map(c => (
            <button key={c.id} className={"chip-btn " + (filter === c.id ? "active" : "")} onClick={() => setFilter(c.id)}>
              {c.label}
            </button>
          ))}
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 10, alignItems: "center" }}>
          <button className="btn-ghost" onClick={handleRefresh} disabled={refreshing} style={{ opacity: refreshing ? 0.6 : 1 }}>
            <Icon name="sliders" size={13}/>
            <span>{refreshing ? "…" : t.refreshPrices}</span>
          </button>
          <button className="btn-primary" onClick={() => onAdd && onAdd()} style={{ padding: "8px 14px" }}>
            <Icon name="plus" size={14}/>
            <span>{t.addAsset}</span>
          </button>
          <span style={{ fontSize: 12, color: "var(--fg-3)", whiteSpace: "nowrap" }}>{rows.length} {t.assetsCount}</span>
        </div>
      </div>

      <div className="card" style={{ padding: 0, marginTop: "var(--density-gap)" }}>
        <div style={{ overflowX: "auto" }}>
          <table className="table market-table">
            <thead>
              <tr>
                {head("symbol", t.symbol)}
                {head("price",  t.price,  true)}
                {head("dayPct", t.pctDay, true)}
                {head("m1Pct",  t.m1,     true)}
                {head("ytdPct", t.ytd,    true)}
                {head("y1Pct",  t.y1,     true)}
                <th style={{ textAlign: "right" }}></th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.id} onClick={() => r.owned && onSelect && onSelect(r.ownedRow)} style={{ cursor: r.owned ? "pointer" : "default" }}>
                  <td>
                    <div className="tkr">
                      <div className="tkr-avatar" style={{ background: tickerColor(r.symbol) }}>{r.symbol.slice(0, 2)}</div>
                      <div>
                        <div className="tkr-name">
                          {r.symbol}
                          {r.owned && <span className="owned-badge" title={t.owned}>{typeLabel(r.type, lang)}</span>}
                          {!r.owned && <span className="type-badge">{typeLabel(r.type, lang)}</span>}
                        </div>
                        <div className="tkr-sub">{r.name}</div>
                      </div>
                    </div>
                  </td>
                  <td className="right mono nowrap" style={{ fontWeight: 600 }}>{fmtMoney(r.price * fx, currency)}</td>
                  <td className="right">{pctCell(r.dayPct)}</td>
                  <td className="right">{pctCell(r.m1Pct)}</td>
                  <td className="right">{pctCell(r.ytdPct)}</td>
                  <td className="right">{pctCell(r.y1Pct)}</td>
                  <td className="right" style={{ paddingRight: 16 }}>
                    <button className="btn-ghost add-asset-btn" onClick={(e) => { e.stopPropagation(); onAdd && onAdd(r); }}>
                      <Icon name="plus" size={12}/>
                      <span>{t.add}</span>
                    </button>
                  </td>
                </tr>
              ))}
              {rows.length === 0 && (
                <tr><td colSpan={7} style={{ padding: 32, textAlign: "center", color: "var(--fg-3)" }}>—</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

Object.assign(window, { MarketView });
</script>
<script type="text/babel">// Rebalancing / Transactions / Allocation / Forecast — all 4 page views

const TickerCell = ({ symbol, name, type, lang }) => (
  <div className="tkr">
    <div className="tkr-avatar" style={{ background: tickerColor(symbol) }}>{symbol.slice(0, 2)}</div>
    <div>
      <div className="tkr-name">{symbol}</div>
      <div className="tkr-sub">{name}</div>
    </div>
  </div>
);

const DriftBar = ({ actual, target }) => {
  const max = Math.max(Math.abs(actual - target), 4);
  const pct = Math.min(50, (Math.abs(actual - target) / max) * 50);
  const isOver = actual > target;
  return (
    <div className="drift-bar">
      <div className={"fill " + (isOver ? "over" : "under")}
           style={isOver ? { width: pct + "%" } : { width: pct + "%" }}/>
      <div className="axis"/>
    </div>
  );
};

// ─────────────────────────────────────────────────────────── REBALANCING
const RebalancingView = ({ data, builtRows, lang, currency, eurusd, settings, setKey }) => {
  const t = T[lang];
  const fx = currency === "USD" ? eurusd : 1;
  const [mode, setMode] = React.useState("deposit");
  const [amount, setAmount] = React.useState("");
  const [allowSells, setAllowSells] = React.useState(false);
  const [included, setIncluded] = React.useState(() => {
    const o = {}; (builtRows || []).forEach(r => { o[r.tid] = true; });
    return o;
  });

  const totalNow = builtRows.reduce((s, r) => s + r.value, 0);
  const delta = (parseFloat(amount) || 0) * (mode === "withdraw" ? -1 : 1);
  const newTotal = Math.max(0, totalNow + delta);

  const rows = React.useMemo(() => {
    const incRows = builtRows.filter(r => included[r.tid]);
    const totalTarget = incRows.reduce((s, r) => s + (r.target || 0), 0) || 1;
    return builtRows.map(r => {
      const targetPct = (r.target || 0);
      const actualPct = totalNow > 0 ? (r.value / totalNow) * 100 : 0;
      const targetValue = included[r.tid] ? newTotal * (targetPct / totalTarget) : r.value;
      const diffEur = targetValue - r.value;
      const sharesDelta = r.price > 0 ? diffEur / r.price : 0;
      return { ...r, actualPct, targetPct, targetValue, diffEur, sharesDelta };
    });
  }, [builtRows, included, totalNow, newTotal]);

  const tradesToBuy = rows.filter(r => included[r.tid] && r.diffEur > 0.5);
  const tradesToSell = allowSells ? rows.filter(r => included[r.tid] && r.diffEur < -0.5) : [];
  const totalToBuy = tradesToBuy.reduce((s, r) => s + r.diffEur, 0);

  return (
    <div>
      <div className="card" style={{ padding: 16, marginBottom: "var(--density-gap)", display: "flex", gap: 18, alignItems: "center", flexWrap: "wrap" }}>
        <div className="seg">
          <button className={mode === "deposit" ? "active" : ""} onClick={() => setMode("deposit")}>{t.deposit}</button>
          <button className={mode === "withdraw" ? "active" : ""} onClick={() => setMode("withdraw")}>{t.withdraw}</button>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          <div className="summary-label">{t.depositAmount}</div>
          <input className="inline-num" style={{ width: 120, fontSize: 15 }} value={amount} onChange={e => setAmount(e.target.value.replace(/[^\d.]/g, ""))} placeholder="0"/>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginLeft: 8 }}>
          <div>
            <div style={{ fontWeight: 600, fontSize: 13 }}>{t.allowSells}</div>
            <div className="summary-sub">{t.allowSellsHint}</div>
          </div>
          <div className={"switch " + (allowSells ? "on" : "")} onClick={() => setAllowSells(v => !v)}/>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 0 }}>
          <div style={{ padding: "6px 22px", borderRight: "1px solid var(--border)" }}>
            <div className="summary-label">{t.deposit}</div>
            <div className="summary-value" style={{ fontSize: 18 }}>{fmtMoney(Math.max(0, delta) * fx, currency)}</div>
          </div>
          <div style={{ padding: "6px 22px", borderRight: "1px solid var(--border)" }}>
            <div className="summary-label">{t.newPortfolio}</div>
            <div className="summary-value" style={{ fontSize: 18 }}>{fmtMoney(newTotal * fx, currency)}</div>
          </div>
          <div style={{ padding: "6px 22px" }}>
            <div className="summary-label">{t.toBuy}</div>
            <div className="summary-value up" style={{ fontSize: 18 }}>+{fmtMoney(totalToBuy * fx, currency)}</div>
          </div>
        </div>
      </div>

      <div className="card" style={{ padding: 0 }}>
        <table className="table market-table">
          <thead>
            <tr>
              <th>{t.symbol}</th>
              <th className="right">{t.currentWeight}</th>
              <th className="right">{t.target} %</th>
              <th className="right">{t.diffEur}</th>
              <th className="right">{t.sharesDelta}</th>
              <th style={{ width: 200 }}>{t.allocation_title}</th>
              <th className="right" style={{ width: 60 }}>{t.include}</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(r => {
              const inc = !!included[r.tid];
              const isBuy = r.diffEur > 0.5;
              const isSell = r.diffEur < -0.5;
              return (
                <tr key={r.tid} style={{ opacity: inc ? 1 : 0.4 }}>
                  <td><TickerCell symbol={r.symbol} name={r.name}/></td>
                  <td className="right mono">{r.actualPct.toFixed(2)}%</td>
                  <td className="right mono" style={{ color: "var(--accent)" }}>{r.targetPct.toFixed(2)}%</td>
                  <td className="right mono nowrap" style={{ color: isBuy ? "var(--up)" : isSell ? "var(--down)" : "var(--fg-3)" }}>
                    {inc ? (isBuy ? "+" : "") + fmtMoney(r.diffEur * fx, currency) : "—"}
                  </td>
                  <td className="right mono nowrap" style={{ color: isBuy ? "var(--up)" : isSell ? "var(--down)" : "var(--fg-3)" }}>
                    {inc && Math.abs(r.sharesDelta) > 0.0001 ? (isBuy ? "+" : "") + fmtShares(r.sharesDelta) : "—"}
                  </td>
                  <td><DriftBar actual={r.actualPct} target={r.targetPct}/></td>
                  <td className="right">
                    <div className={"switch " + (inc ? "on" : "")} style={{ display: "inline-block" }}
                         onClick={() => setIncluded(s => ({ ...s, [r.tid]: !s[r.tid] }))}/>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {(tradesToBuy.length > 0 || tradesToSell.length > 0) && (
        <div className="card" style={{ padding: 18, marginTop: "var(--density-gap)" }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
            <Icon name="check" size={14}/> {t.tradesToExecute}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 8 }}>
            {[...tradesToBuy, ...tradesToSell].map(r => (
              <div key={r.tid} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: "var(--card-2)", borderRadius: 10 }}>
                <div className="tkr-avatar" style={{ background: tickerColor(r.symbol), width: 28, height: 28, fontSize: 10 }}>{r.symbol.slice(0,2)}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 12 }}>{r.symbol}</div>
                  <div className="summary-sub">{fmtShares(Math.abs(r.sharesDelta))} × {fmtMoney(r.price * fx, currency)}</div>
                </div>
                <span className={"tx-type-pill " + (r.diffEur > 0 ? "buy" : "sell")}>{r.diffEur > 0 ? t.buy : t.sell}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

// ─────────────────────────────────────────────────────────── TRANSACTIONS
const TransactionsView = ({ data, lang, currency, eurusd }) => {
  const t = T[lang];
  const fx = currency === "USD" ? eurusd : 1;
  const [filter, setFilter] = React.useState("all");
  const [order, setOrder] = React.useState("newest");
  const [query, setQuery] = React.useState("");

  const tickerById = {};
  (data.tickers || []).forEach(tk => { tickerById[tk.id] = tk; });

  const allTx = React.useMemo(() => {
    const out = [];
    Object.entries(data.txns || {}).forEach(([tid, list]) => {
      const tk = tickerById[+tid] || tickerById[tid];
      if (!tk) return;
      list.forEach(tx => out.push({ ...tx, tid, symbol: tk.symbol, name: tk.name }));
    });
    return out;
  }, [data]);

  const rows = React.useMemo(() => {
    let r = allTx;
    if (filter !== "all") r = r.filter(x => x.type === filter);
    const q = query.trim().toLowerCase();
    if (q) r = r.filter(x => x.symbol.toLowerCase().includes(q) || (x.name || "").toLowerCase().includes(q));
    const dir = order === "newest" ? -1 : 1;
    return [...r].sort((a, b) => dir * (a.date || "").localeCompare(b.date || ""));
  }, [allTx, filter, order, query]);

  const fmtDate = d => {
    if (!d) return "—";
    const dt = new Date(d);
    return dt.toLocaleDateString(lang === "uk" ? "uk-UA" : "en-GB", { day: "2-digit", month: "2-digit", year: "numeric" });
  };

  return (
    <div>
      <div className="card market-toolbar" style={{ marginBottom: "var(--density-gap)" }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
          <div style={{ fontSize: 13, color: "var(--fg-3)" }}>{rows.length} {t.txCount}</div>
        </div>
        <div className="search" style={{ flex: "0 1 280px", padding: "8px 12px" }}>
          <Icon name="search" size={14}/>
          <input placeholder={t.marketSearch} value={query} onChange={e => setQuery(e.target.value)}/>
        </div>
        <div className="market-chips">
          <button className={"chip-btn " + (filter === "all" ? "active" : "")} onClick={() => setFilter("all")}>{t.allTypes}</button>
          <button className={"chip-btn " + (filter === "buy" ? "active" : "")} onClick={() => setFilter("buy")}>{t.buys}</button>
          <button className={"chip-btn " + (filter === "sell" ? "active" : "")} onClick={() => setFilter("sell")}>{t.sells}</button>
        </div>
        <div className="seg" style={{ marginLeft: "auto" }}>
          <button className={order === "newest" ? "active" : ""} onClick={() => setOrder("newest")}>{t.newest}</button>
          <button className={order === "oldest" ? "active" : ""} onClick={() => setOrder("oldest")}>{t.oldest}</button>
        </div>
      </div>

      <div className="card" style={{ padding: 0 }}>
        <table className="table market-table">
          <thead>
            <tr>
              <th>{t.symbol}</th>
              <th>{t.type}</th>
              <th>{t.date}</th>
              <th className="right">{t.quantity}</th>
              <th className="right">{t.price}</th>
              <th className="right">{t.sumEur}</th>
              <th style={{ width: 80 }}></th>
            </tr>
          </thead>
          <tbody>
            {rows.map(tx => {
              const sum = tx.shares * tx.price;
              return (
                <tr key={tx.id}>
                  <td><TickerCell symbol={tx.symbol} name={tx.name}/></td>
                  <td><span className={"tx-type-pill " + tx.type}>{tx.type === "buy" ? t.buy : t.sell}</span></td>
                  <td className="mono" style={{ color: "var(--fg-2)" }}>{fmtDate(tx.date)}</td>
                  <td className="right mono">{fmtShares(tx.shares)}</td>
                  <td className="right mono">{fmtMoney(tx.price * fx, currency)}</td>
                  <td className="right mono nowrap" style={{ fontWeight: 600, color: tx.type === "buy" ? "var(--up)" : "var(--down)" }}>
                    {tx.type === "buy" ? "+" : "−"}{fmtMoney(sum * fx, currency)}
                  </td>
                  <td className="right" style={{ paddingRight: 16 }}>
                    <button className="row-icon-btn" title={t.txEdit}><Icon name="sliders" size={13}/></button>
                    <button className="row-icon-btn danger" title={t.cancel}><Icon name="x" size={13}/></button>
                  </td>
                </tr>
              );
            })}
            {rows.length === 0 && <tr><td colSpan={7} style={{ padding: 32, textAlign: "center", color: "var(--fg-3)" }}>—</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────── ALLOCATION
const AllocationView = ({ data, builtRows, lang, currency, eurusd }) => {
  const t = T[lang];
  const fx = currency === "USD" ? eurusd : 1;
  const initialTargets = {};
  builtRows.forEach(r => { initialTargets[r.tid] = r.target || 0; });
  const [targets, setTargets] = React.useState(initialTargets);
  const [savedFlash, setSavedFlash] = React.useState(false);

  const total = builtRows.reduce((s, r) => s + r.value, 0);
  const sumPct = Object.values(targets).reduce((s, v) => s + (parseFloat(v) || 0), 0);
  const inNorm = builtRows.filter(r => Math.abs(r.actualPct - (parseFloat(targets[r.tid]) || 0)) < 1).length;
  const drifting = builtRows.length - inNorm;
  const sumOk = Math.abs(sumPct - 100) < 0.01;

  const setTarget = (tid, val) => setTargets(s => ({ ...s, [tid]: val }));
  const autoBalance = () => {
    const remain = 100 - sumPct;
    const zeros = builtRows.filter(r => !(parseFloat(targets[r.tid]) > 0));
    if (zeros.length && remain > 0) {
      const each = remain / zeros.length;
      const next = { ...targets };
      zeros.forEach(r => { next[r.tid] = each.toFixed(2); });
      setTargets(next);
    }
  };

  return (
    <div>
      <div className="card page-summary cols-4" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 2fr" }}>
        <div className="summary-cell">
          <div className="summary-label">{t.assets}</div>
          <div className="summary-value">{builtRows.length}</div>
        </div>
        <div className="summary-cell">
          <div className="summary-label">{t.inNorm}</div>
          <div className="summary-value up">{inNorm}</div>
        </div>
        <div className="summary-cell">
          <div className="summary-label">{t.drifting}</div>
          <div className="summary-value down">{drifting}</div>
        </div>
        <div className="summary-cell" style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div className="summary-label">{t.sumPct}</div>
            <div className="summary-value" style={{ color: sumOk ? "var(--up)" : "var(--down)" }}>
              {sumPct.toFixed(2)}% {sumOk && <Icon name="check" size={16}/>}
            </div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="btn-ghost" onClick={autoBalance}>{t.autoBalance}</button>
            <button className="btn-primary" onClick={() => { setSavedFlash(true); setTimeout(() => setSavedFlash(false), 1200); }}>
              {savedFlash ? <Icon name="check" size={14}/> : null}
              <span>{t.saveTargets}</span>
            </button>
          </div>
        </div>
      </div>

      <div className="card" style={{ padding: 0 }}>
        <table className="table market-table">
          <thead>
            <tr>
              <th>{t.symbol}</th>
              <th className="right">{t.actualPct}</th>
              <th className="right">{t.target} %</th>
              <th className="right">{t.drift}</th>
              <th style={{ width: 220 }}>{t.allocation_title}</th>
              <th className="right">{t.value}</th>
            </tr>
          </thead>
          <tbody>
            {builtRows.map(r => {
              const tgt = parseFloat(targets[r.tid]) || 0;
              const drift = r.actualPct - tgt;
              const isOk = Math.abs(drift) < 1;
              return (
                <tr key={r.tid}>
                  <td><TickerCell symbol={r.symbol} name={r.name}/></td>
                  <td className="right mono" style={{ color: "var(--accent)" }}>{r.actualPct.toFixed(2)}%</td>
                  <td className="right">
                    <input className="inline-num" value={targets[r.tid] ?? ""} onChange={e => setTarget(r.tid, e.target.value.replace(/[^\d.]/g, ""))}/>
                  </td>
                  <td className="right mono" style={{ color: isOk ? "var(--fg-3)" : drift > 0 ? "var(--down)" : "var(--up)" }}>
                    {drift >= 0 ? "+" : ""}{drift.toFixed(2)}%
                  </td>
                  <td><DriftBar actual={r.actualPct} target={tgt}/></td>
                  <td className="right mono nowrap" style={{ fontWeight: 600 }}>{fmtMoney(r.value * fx, currency)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────── FORECAST
const ForecastView = ({ data, builtRows, lang, currency, eurusd }) => {
  const t = T[lang];
  const fx = currency === "USD" ? eurusd : 1;
  const rows = builtRows.filter(r => r.priceTgt && r.shares > 0);
  const totalNow = rows.reduce((s, r) => s + r.value, 0);
  const totalAtTgt = rows.reduce((s, r) => s + (r.shares * r.priceTgt), 0);
  const potential = totalNow > 0 ? ((totalAtTgt - totalNow) / totalNow) * 100 : 0;

  const sortedRows = [...rows].sort((a, b) => (b.upside || 0) - (a.upside || 0));

  return (
    <div>
      <div className="card page-summary">
        <div className="summary-cell">
          <div className="summary-label">{t.now}</div>
          <div className="summary-value">{fmtMoney(totalNow * fx, currency)}</div>
        </div>
        <div className="summary-cell">
          <div className="summary-label">{t.atTargets}</div>
          <div className="summary-value up">{fmtMoney(totalAtTgt * fx, currency)}</div>
          <div className="summary-sub">+{fmtMoney((totalAtTgt - totalNow) * fx, currency)}</div>
        </div>
        <div className="summary-cell">
          <div className="summary-label">{t.potential}</div>
          <div className="summary-value up">+{potential.toFixed(2)}%</div>
        </div>
      </div>

      <div className="card" style={{ padding: 0 }}>
        <table className="table market-table">
          <thead>
            <tr>
              <th>{t.symbol}</th>
              <th className="right">{t.currentPrice}</th>
              <th className="right">{t.analyst}</th>
              <th className="right">{t.potential}</th>
              <th style={{ width: 220 }}>{t.progress}</th>
              <th className="right">{t.valueNow}</th>
              <th className="right">{t.atTarget}</th>
            </tr>
          </thead>
          <tbody>
            {sortedRows.map(r => {
              const upside = r.upside || 0;
              // progress: how far along we are from cost basis price → analyst target
              const lo = r.avgPrice || r.price * 0.5;
              const hi = r.priceTgt;
              const progress = hi > lo ? Math.max(0, Math.min(100, ((r.price - lo) / (hi - lo)) * 100)) : 50;
              const targetValue = r.shares * r.priceTgt;
              return (
                <tr key={r.tid}>
                  <td><TickerCell symbol={r.symbol} name={r.name}/></td>
                  <td className="right mono nowrap">{fmtMoney(r.price * fx, currency)}</td>
                  <td className="right mono nowrap" style={{ color: "var(--up)" }}>{fmtMoney(r.priceTgt * fx, currency)}</td>
                  <td className="right">
                    <span className={"pct-pill " + (upside >= 0 ? "up" : "down")}>
                      {upside >= 0 ? "+" : ""}{upside.toFixed(2)}%
                    </span>
                  </td>
                  <td>
                    <div className="prog-bar">
                      <div className="prog-fill" style={{ width: progress + "%" }}/>
                    </div>
                  </td>
                  <td className="right mono nowrap">{fmtMoney(r.value * fx, currency)}</td>
                  <td className="right mono nowrap" style={{ color: "var(--up)", fontWeight: 600 }}>{fmtMoney(targetValue * fx, currency)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

Object.assign(window, { RebalancingView, TransactionsView, AllocationView, ForecastView });
</script>
<script type="text/babel">// Main app
const { useState, useEffect, useMemo, useRef } = React;

const ACCENTS = [
  { name: "green",  val: "oklch(0.76 0.17 155)", fg: "oklch(0.22 0.05 155)" },
  { name: "orange", val: "oklch(0.73 0.19 55)",  fg: "oklch(0.22 0.05 55)" },
  { name: "blue",   val: "oklch(0.68 0.17 255)", fg: "oklch(0.96 0.02 255)" },
  { name: "violet", val: "oklch(0.68 0.2 300)",  fg: "oklch(0.96 0.02 300)" },
  { name: "lime",   val: "oklch(0.87 0.2 125)",  fg: "oklch(0.22 0.05 125)" },
];

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "green",
  "density": "comfortable",
  "chartStyle": "area",
  "allocViz": "bars",
  "currency": "EUR",
  "language": "en",
  "showMovers": true,
  "showAllocation": true,
  "showHoldings": true
}/*EDITMODE-END*/;

function App() {
  const [data, setData] = useState(null);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [editMode, setEditMode] = useState(false);
  const [settings, setSettings] = useState(DEFAULTS);
  const [range, setRange] = useState(localStorage.getItem("range") || "1M");
  const [selected, setSelected] = useState(null);
  const [addOpen, setAddOpen] = useState(false);
  const [query, setQuery] = useState("");
  const [page, setPage] = useState("dashboard");
  const [hovered, setHovered] = useState(null);
  const [sortKey, setSortKey] = useState("value");
  const [sortDir, setSortDir] = useState("desc");

  useEffect(() => {
    fetch("data/portfolio_data.json").then(r => r.json()).then(setData).catch(console.error);
  }, []);

  useEffect(() => {
    const onMsg = e => {
      if (e.data?.type === "__activate_edit_mode") setEditMode(true);
      if (e.data?.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  useEffect(() => localStorage.setItem("range", range), [range]);

  useEffect(() => {
    document.documentElement.dataset.theme = settings.theme;
    document.documentElement.dataset.density = settings.density;
    const a = ACCENTS.find(x => x.name === settings.accent) || ACCENTS[0];
    document.documentElement.style.setProperty("--accent", a.val);
    document.documentElement.style.setProperty("--accent-fg", a.fg);
    document.documentElement.style.setProperty("--accent-dim", a.val.replace(")", " / 0.15)"));
    document.documentElement.style.setProperty("--up", a.name === "orange" || a.name === "lime" ? "oklch(0.76 0.17 155)" : a.val);
    document.documentElement.style.setProperty("--up-dim", "oklch(0.76 0.17 155 / 0.12)");
  }, [settings.theme, settings.density, settings.accent]);

  const setKey = (k, v) => {
    setSettings(s => ({ ...s, [k]: v }));
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  };

  const built = useMemo(() => data ? buildHoldings(data) : null, [data]);
  const history = useMemo(() => data ? filterHistory(data.history || [], range) : [], [data, range]);
  const dayCh = useMemo(() => dayChange(data?.history || []), [data]);

  // Single source of truth for the ordered, filtered rows shared by Holdings + Allocation
  const displayRows = useMemo(() => {
    if (!built) return [];
    const q = query.trim().toLowerCase();
    const filtered = built.rows.filter(r =>
      !q || r.symbol.toLowerCase().includes(q) || r.name.toLowerCase().includes(q)
    );
    const dir = sortDir === "asc" ? 1 : -1;
    return filtered.sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (typeof av === "string") return dir * av.localeCompare(bv);
      return dir * (av - bv);
    });
  }, [built, query, sortKey, sortDir]);

  const onSort = k => {
    if (k === sortKey) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortKey(k); setSortDir("desc"); }
  };

  if (!data || !built) return null;

  const t = T[settings.language];

  const onSelectRow = row => setSelected(row);
  const handleSave = payload => {
    console.log("Saved transaction:", payload);
    setAddOpen(false);
  };

  const heroBlock  = <Hero total={built.total} dayCh={dayCh} currency={settings.currency} eurusd={data.eurusd || 1.08} lang={settings.language} hovered={hovered}/>;
  const chartBlock = <ChartCard history={history} range={range} setRange={setRange} chartStyle={settings.chartStyle} lang={settings.language} onHover={setHovered}/>;
  const moversBlock = settings.showMovers && <Movers rows={built.rows} lang={settings.language} onSelect={onSelectRow} currency={settings.currency} eurusd={data.eurusd || 1.08}/>;

  return (
    <div className="scale-wrap">
      <TickerTape rows={built.rows} currency={settings.currency} eurusd={data.eurusd || 1.08}/>
      <div className="app">
        <Sidebar lang={settings.language} setLang={v => setKey("language", v)}
                 currency={settings.currency} setCurrency={v => setKey("currency", v)}
                 page={page} setPage={setPage} theme={settings.theme} setTheme={v => setKey("theme", v)}/>
        <main className="main">
          <div className="top-bar">
            <div>
              <div className="greeting">{t.greeting}, Investor</div>
              <h1 className="page-title">{
                page === "market" ? t.marketTitle :
                page === "rebalance" ? t.rebalanceTitle :
                page === "transactions" ? t.txTitle :
                page === "allocation" ? t.allocTitle :
                page === "forecast" ? t.forecastTitle :
                t.pageTitle
              }</h1>
              {page !== "dashboard" && <div className="greeting" style={{ marginTop: 4 }}>{
                page === "market" ? t.marketSub :
                page === "rebalance" ? t.rebalanceSub :
                page === "transactions" ? t.txSub :
                page === "allocation" ? t.allocSub :
                page === "forecast" ? t.forecastSub : ""
              }</div>}
            </div>
          </div>

          {page === "market" ? (
            <MarketView data={data} builtRows={built.rows} lang={settings.language}
              currency={settings.currency} eurusd={data.eurusd || 1.08}
              onSelect={onSelectRow} onAdd={() => setAddOpen(true)}/>
          ) : page === "rebalance" ? (
            <RebalancingView data={data} builtRows={built.rows} lang={settings.language}
              currency={settings.currency} eurusd={data.eurusd || 1.08}/>
          ) : page === "transactions" ? (
            <TransactionsView data={data} lang={settings.language}
              currency={settings.currency} eurusd={data.eurusd || 1.08}/>
          ) : page === "allocation" ? (
            <AllocationView data={data} builtRows={built.rows} lang={settings.language}
              currency={settings.currency} eurusd={data.eurusd || 1.08}/>
          ) : page === "forecast" ? (
            <ForecastView data={data} builtRows={built.rows} lang={settings.language}
              currency={settings.currency} eurusd={data.eurusd || 1.08}/>
          ) : (
          <React.Fragment>
          {/* Top row: [Hero 1/3 over Chart 2/3] | Movers (full height) */}
          <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 2.2fr) minmax(0, 1fr)", gap: "var(--density-gap)", alignItems: "stretch", marginBottom: "var(--density-gap)" }}>
            <div style={{ display: "grid", gridTemplateRows: "1fr 2fr", gap: "var(--density-gap)" }}>
              {heroBlock}
              {chartBlock}
            </div>
            <div style={{ display: "flex", flexDirection: "column" }}>
              {moversBlock}
            </div>
          </div>

          {/* Merged Holdings + Allocation */}
          {(settings.showHoldings || settings.showAllocation) && (
            <div className="merged-card">
              {settings.showHoldings && (
                <div className="panel-block">
                  <Holdings rows={displayRows} currency={settings.currency} eurusd={data.eurusd || 1.08}
                    lang={settings.language} onSelect={onSelectRow}
                    query={query} setQuery={setQuery} onAddTx={() => setAddOpen(true)} embedded
                    sortKey={sortKey} sortDir={sortDir} onSort={onSort}/>
                </div>
              )}
              {settings.showHoldings && settings.showAllocation && <div className="merged-divider"/>}
              {settings.showAllocation && (
                <div className="panel-block">
                  <AllocationCard rows={displayRows} total={built.total} lang={settings.language}
                    viz={settings.allocViz} currency={settings.currency} eurusd={data.eurusd || 1.08}
                    embedded aligned={settings.allocViz === "bars"}/>
                </div>
              )}
            </div>
          )}
          </React.Fragment>
          )}
        </main>
      </div>

      {selected && <AssetPanel row={selected} data={data} onClose={() => setSelected(null)} currency={settings.currency} eurusd={data.eurusd || 1.08} lang={settings.language}/>}
      {addOpen && <AddTxModal tickers={data.tickers} onClose={() => setAddOpen(false)} onSave={handleSave} lang={settings.language}/>}

      {editMode && (
        <>
          <button className="tweaks-fab" onClick={() => setTweaksOpen(o => !o)} title="Tweaks">
            <Icon name="sliders" size={18}/>
          </button>
          {tweaksOpen && (
            <div className="tweaks-panel">
              <h4>{t.tweaks}</h4>

              <div className="tweak-row">
                <span className="tlabel">{t.theme}</span>
                <div className="seg">
                  <button className={settings.theme === "light" ? "active" : ""} onClick={() => setKey("theme", "light")}>{t.light}</button>
                  <button className={settings.theme === "dark" ? "active" : ""} onClick={() => setKey("theme", "dark")}>{t.dark}</button>
                </div>
              </div>

              <div className="tweak-row">
                <span className="tlabel">{t.accent}</span>
                <div className="swatches">
                  {ACCENTS.map(a => (
                    <div key={a.name} className={"swatch " + (settings.accent === a.name ? "sel" : "")}
                         style={{ background: a.val }} onClick={() => setKey("accent", a.name)}/>
                  ))}
                </div>
              </div>

              <div className="tweak-row">
                <span className="tlabel">{t.density}</span>
                <div className="seg">
                  <button className={settings.density === "compact" ? "active" : ""} onClick={() => setKey("density", "compact")}>{t.compact}</button>
                  <button className={settings.density === "comfortable" ? "active" : ""} onClick={() => setKey("density", "comfortable")}>{t.comfortable}</button>
                  <button className={settings.density === "airy" ? "active" : ""} onClick={() => setKey("density", "airy")}>{t.airy}</button>
                </div>
              </div>

              <div className="tweak-row">
                <span className="tlabel">{t.chartStyle}</span>
                <div className="seg">
                  <button className={settings.chartStyle === "area" ? "active" : ""} onClick={() => setKey("chartStyle", "area")}>{t.area}</button>
                  <button className={settings.chartStyle === "line" ? "active" : ""} onClick={() => setKey("chartStyle", "line")}>{t.line}</button>
                  <button className={settings.chartStyle === "candlestick" ? "active" : ""} onClick={() => setKey("chartStyle", "candlestick")}>{t.candles}</button>
                </div>
              </div>

              <div className="tweak-row">
                <span className="tlabel">{t.allocViz}</span>
                <div className="seg">
                  <button className={settings.allocViz === "bars" ? "active" : ""} onClick={() => setKey("allocViz", "bars")}>{t.bars}</button>
                  <button className={settings.allocViz === "donut" ? "active" : ""} onClick={() => setKey("allocViz", "donut")}>{t.donut}</button>
                  <button className={settings.allocViz === "heatmap" ? "active" : ""} onClick={() => setKey("allocViz", "heatmap")}>{t.heatmap}</button>
                </div>
              </div>

              <div className="tweak-row">
                <span className="tlabel">{t.currency}</span>
                <div className="seg">
                  <button className={settings.currency === "EUR" ? "active" : ""} onClick={() => setKey("currency", "EUR")}>EUR €</button>
                  <button className={settings.currency === "USD" ? "active" : ""} onClick={() => setKey("currency", "USD")}>USD $</button>
                </div>
              </div>

              <div className="tweak-row">
                <span className="tlabel">{t.language}</span>
                <div className="seg">
                  <button className={settings.language === "en" ? "active" : ""} onClick={() => setKey("language", "en")}>EN</button>
                  <button className={settings.language === "uk" ? "active" : ""} onClick={() => setKey("language", "uk")}>UA</button>
                </div>
              </div>

              <div className="tweak-row">
                <span className="tlabel">{t.sections}</span>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, cursor: "pointer" }}>
                    <input type="checkbox" checked={settings.showMovers} onChange={e => setKey("showMovers", e.target.checked)}/>
                    {t.movers}
                  </label>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, cursor: "pointer" }}>
                    <input type="checkbox" checked={settings.showAllocation} onChange={e => setKey("showAllocation", e.target.checked)}/>
                    {t.allocation_title}
                  </label>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, cursor: "pointer" }}>
                    <input type="checkbox" checked={settings.showHoldings} onChange={e => setKey("showHoldings", e.target.checked)}/>
                    {t.topHoldings}
                  </label>
                </div>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>


</body></html>
