<style>
  :root {
    --accent: oklch(0.76 0.17 155);
    --accent-dim: oklch(0.76 0.17 155 / 0.15);
    --accent-fg: oklch(0.22 0.05 155);
    --up: oklch(0.76 0.17 155);
    --down: oklch(0.68 0.2 25);
    --up-dim: oklch(0.76 0.17 155 / 0.12);
    --down-dim: oklch(0.68 0.2 25 / 0.12);

    /* dark defaults */
    --bg: oklch(0.16 0.008 240);
    --bg-2: oklch(0.19 0.008 240);
    --card: oklch(0.21 0.008 240);
    --card-2: oklch(0.24 0.008 240);
    --border: oklch(0.3 0.008 240);
    --fg: oklch(0.97 0.005 240);
    --fg-2: oklch(0.78 0.008 240);
    --fg-3: oklch(0.58 0.008 240);
    --shadow: 0 1px 0 oklch(1 0 0 / 0.04) inset, 0 8px 24px oklch(0 0 0 / 0.25);
    --radius: 18px;
    --radius-sm: 10px;
    --density-pad: 22px;
    --density-row: 56px;
    --density-gap: 18px;
  }
  [data-theme="light"] {
    --bg: oklch(0.98 0.003 240);
    --bg-2: oklch(0.96 0.003 240);
    --card: oklch(1 0 0);
    --card-2: oklch(0.98 0.003 240);
    --border: oklch(0.9 0.004 240);
    --fg: oklch(0.2 0.01 240);
    --fg-2: oklch(0.42 0.008 240);
    --fg-3: oklch(0.58 0.008 240);
    --shadow: 0 1px 0 oklch(1 0 0 / 0.6) inset, 0 1px 2px oklch(0 0 0 / 0.04), 0 8px 24px oklch(0 0 0 / 0.04);
  }
  [data-density="compact"] { --density-pad: 14px; --density-row: 44px; --density-gap: 12px; }
  [data-density="airy"]    { --density-pad: 28px; --density-row: 68px; --density-gap: 24px; }

  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--fg); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }
  /* page-level 80% scale */
  html, body { height: 100%; }
  .scale-wrap {
    transform: scale(0.8); transform-origin: top left;
    width: 125%; height: 125vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  .num { font-variant-numeric: tabular-nums; }

  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  input { font: inherit; color: inherit; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* app shell */
  .app { display: flex; flex: 1; min-height: 0; }

  /* main */
  .main { padding: 20px 28px 40px; width: 100%; max-width: none; }

  /* ticker tape */
  .ticker-tape {
    position: relative;
    overflow: hidden;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    height: 34px; flex-shrink: 0;
    display: flex; align-items: center;
  }
  .ticker-tape::before, .ticker-tape::after {
    content: ""; position: absolute; top: 0; bottom: 0; width: 60px; z-index: 2; pointer-events: none;
  }
  .ticker-tape::before { left: 0; background: linear-gradient(to right, var(--card), transparent); }
  .ticker-tape::after  { right: 0; background: linear-gradient(to left,  var(--card), transparent); }
  .ticker-track {
    display: flex; gap: 28px; white-space: nowrap;
    animation: ticker-scroll 90s linear infinite;
    padding-left: 28px;
  }
  .ticker-tape:hover .ticker-track { animation-play-state: paused; }
  @keyframes ticker-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .ticker-item { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--fg-2); }
  .ticker-sep { width: 1px; height: 12px; background: var(--border); }
  .ticker-sym { font-weight: 600; color: var(--fg); font-size: 11px; letter-spacing: 0.02em; }
  .ticker-price { color: var(--fg-2); font-variant-numeric: tabular-nums; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; }
  .ticker-chg { font-weight: 600; font-variant-numeric: tabular-nums; font-size: 10px; }
  .ticker-chg.up { color: var(--up); }
  .ticker-chg.down { color: var(--down); }

  /* sidebar */
  .sidebar {
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    padding: 24px 18px;
    width: 240px; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 4px;
    overflow-y: auto;
    height: 100%;
  }
  @media (max-width: 1100px) {
    .sidebar { width: 72px; }
    .sidebar .s-full { display: none; }
  }
  .brand { display: flex; align-items: center; gap: 10px; padding: 0 8px 24px; }
  .brand-mark { width: 32px; height: 32px; border-radius: 9px; background: var(--accent); display: grid; place-items: center; color: var(--accent-fg); font-weight: 800; font-size: 17px; }
  .brand-name { font-weight: 700; letter-spacing: -0.01em; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; color: var(--fg-2); font-weight: 500; font-size: 14px; cursor: pointer; }
  .nav-item:hover { background: var(--card); color: var(--fg); }
  .nav-item.active { background: var(--card); color: var(--fg); }
  .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-left: auto; }
  .nav-sep { height: 1px; background: var(--border); margin: 16px 8px; }
  .nav-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); padding: 4px 12px; font-weight: 600; }

  .sidebar-footer { margin-top: auto; display: flex; flex-direction: column; gap: 8px; padding-top: 16px; }
  .user-chip { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; background: var(--card); }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), oklch(0.7 0.15 220)); }
  .user-name { font-size: 13px; font-weight: 600; }
  .user-sub { font-size: 11px; color: var(--fg-3); }

  /* main */
  .main { padding: 20px 28px 40px; flex: 1; min-width: 0; overflow-y: auto; }
  @media (max-width: 900px) { .main { padding: 20px; } }

  /* merged holdings+allocation card */
  .merged-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: grid; grid-template-columns: minmax(0, 1.6fr) 1px minmax(0, 1fr);
  }
  .merged-card > .panel-block { padding: var(--density-pad); min-width: 0; display: flex; flex-direction: column; }
  .merged-card > .panel-block > .card-header { min-height: 44px; align-items: center; }
  .merged-divider {
    background: linear-gradient(to bottom, transparent 0%, var(--border) 18%, var(--border) 82%, transparent 100%);
    opacity: 0.6;
  }
  @media (max-width: 1100px) {
    .merged-card { grid-template-columns: 1fr; }
    .merged-divider { display: none; }
  }

  .top-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .greeting { font-size: 13px; color: var(--fg-3); }
  .page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 2px 0 0; }
  .top-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }

  .search {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 9px 14px; min-width: 240px;
  }
  .search input { background: transparent; border: 0; outline: 0; flex: 1; font-size: 13px; color: var(--fg); }
  .search input::placeholder { color: var(--fg-3); }

  .icon-btn { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 12px; background: var(--card); border: 1px solid var(--border); color: var(--fg-2); }
  .icon-btn:hover { color: var(--fg); }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 12px; background: var(--accent); color: var(--accent-fg);
    font-weight: 600; font-size: 13px;
  }
  .btn-primary:hover { filter: brightness(1.05); }
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 12px; border-radius: 10px; background: var(--card); border: 1px solid var(--border);
    font-weight: 500; font-size: 13px; color: var(--fg-2);
  }
  .btn-ghost:hover { color: var(--fg); }
  .btn-ghost.active { background: var(--accent-dim); color: var(--fg); border-color: transparent; }

  /* cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--density-pad);
  }
  .card h3 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .card-sub { font-size: 12px; color: var(--fg-3); margin-top: 2px; }
  .card-header { display: flex; align-items: start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }

  /* layout A: grid */
  .grid-a {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: var(--density-gap);
  }
  .grid-a .span-2 { grid-column: span 2; }
  @media (max-width: 1100px) { .grid-a { grid-template-columns: 1fr; } .grid-a .span-2 { grid-column: auto; } }

  /* hero card */
  .hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    display: flex; flex-direction: column; gap: 22px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(circle at 80% 0%, var(--accent-dim), transparent 55%);
    pointer-events: none;
  }
  .hero > * { position: relative; }
  .hero-label { font-size: 12px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .hero-value { font-size: 52px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; margin-top: 6px; }
  .hero-value .cur { font-size: 28px; color: var(--fg-3); font-weight: 500; margin-right: 8px; }
  .hero-delta { display: inline-flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 14px; }
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
  }
  .pill.up   { background: var(--up-dim);   color: var(--up); }
  .pill.down { background: var(--down-dim); color: var(--down); }

  .hero-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; padding-top: 18px; border-top: 1px solid var(--border); }
  .hero-stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); font-weight: 600; margin-bottom: 6px; }
  .hero-stat-value { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  .hero-stat-sub { font-size: 12px; color: var(--fg-3); margin-top: 2px; }

  /* chart */
  .chart-wrap { position: relative; height: 260px; }
  .layout-focus .chart-wrap { height: 340px; }
  .chart-wrap svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .chart-tooltip {
    position: absolute; pointer-events: none;
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 12px; font-size: 12px; min-width: 140px;
    box-shadow: 0 8px 24px oklch(0 0 0 / 0.25);
    transform: translate(-50%, calc(-100% - 12px));
  }
  .chart-tooltip .t { color: var(--fg-3); font-size: 11px; }
  .chart-tooltip .v { font-weight: 700; font-size: 14px; margin-top: 2px; }
  .chart-ranges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .card-header { flex-wrap: wrap; }
  .chart-ranges button { padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; color: var(--fg-3); }
  .chart-ranges button.active { background: var(--card-2); color: var(--fg); }

  /* holdings table */
  .table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .table th { text-align: left; font-weight: 500; color: var(--fg-3); padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; user-select: none; white-space: nowrap; }
  .table th:hover { color: var(--fg); }
  .table th .arrow { opacity: 0.5; margin-left: 4px; }
  .table th.sorted .arrow { opacity: 1; }
  .table td { padding: 14px 12px; border-bottom: 1px solid var(--border); }
  .table tbody tr:last-child td { border-bottom: 0; }
  .table tbody tr { cursor: pointer; }
  .table tbody tr:hover { background: var(--card-2); }
  .tkr { display: flex; align-items: center; gap: 12px; }
  .tkr-avatar { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; font-weight: 700; font-size: 12px; color: oklch(0.98 0 0); flex-shrink: 0; }
  .tkr-name { font-weight: 600; }
  .tkr-sub { color: var(--fg-3); font-size: 11px; margin-top: 2px; }
  .right { text-align: right; }
  .nowrap { white-space: nowrap; }

  /* allocation bars */
  .alloc-row { display: grid; grid-template-columns: 90px 1fr 90px; gap: 12px; align-items: center; padding: 9px 0; }
  /* aligned: no symbol label (lives in holdings row); match table row height + thead */
  .alloc-aligned { display: flex; flex-direction: column; }
  .alloc-aligned .alloc-thead {
    height: 33px; /* matches .table th height */
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--fg-3); font-weight: 500;
    padding: 0 4px;
  }
  .alloc-aligned .aligned-row {
    display: grid; grid-template-columns: 1fr 96px; gap: 12px; align-items: center;
    border-bottom: 1px solid var(--border);
    min-height: 63px; /* matches .table td padding + content */
  }
  .alloc-aligned .aligned-row:last-child { border-bottom: 0; }
  .alloc-aligned .alloc-nums { text-align: right; }
  [data-density="compact"] .alloc-aligned .aligned-row { min-height: 45px; }
  [data-density="airy"] .alloc-aligned .aligned-row { min-height: 75px; }
  .alloc-label { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .alloc-label .chip { width: 8px; height: 8px; border-radius: 3px; }
  .alloc-bar { position: relative; height: 8px; background: var(--card-2); border-radius: 4px; overflow: visible; }
  .alloc-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 4px; background: var(--accent); transition: width 0.4s ease; }
  .alloc-fill.over { background: oklch(0.72 0.16 60); }
  .alloc-fill.under { background: var(--accent); opacity: 0.7; }
  .alloc-target {
    position: absolute; top: -4px; bottom: -4px; width: 2px;
    background: var(--fg); border-radius: 2px;
  }
  .alloc-target::after {
    content: ""; position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: var(--fg);
  }
  .alloc-nums { text-align: right; font-size: 12px; }
  .alloc-nums .big { font-weight: 600; font-size: 13px; }
  .alloc-nums .small { color: var(--fg-3); font-size: 11px; }

  /* donut */
  .donut-wrap { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .donut-center { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; pointer-events: none; }
  .donut-center .big { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .donut-center .small { font-size: 11px; color: var(--fg-3); }

  /* movers */
  .mover { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .mover:last-child { border-bottom: 0; }
  .mover .tkr-avatar { width: 32px; height: 32px; font-size: 11px; }
  .mover-info { flex: 1; min-width: 0; }
  .mover-sym { font-weight: 600; font-size: 13px; }
  .mover-name { color: var(--fg-3); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* asset detail panel */
  .overlay { position: fixed; inset: 0; background: oklch(0 0 0 / 0.5); backdrop-filter: blur(4px); z-index: 40; animation: fade 0.2s ease; }
  @keyframes fade { from { opacity: 0; } }
  @keyframes slide-in { from { transform: translateX(100%); } }
  .panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(520px, 100%); background: var(--bg); z-index: 50;
    border-left: 1px solid var(--border);
    overflow-y: auto; padding: 28px;
    animation: slide-in 0.32s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .panel-close { position: absolute; top: 22px; right: 22px; }

  /* modal */
  .modal {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: min(420px, calc(100% - 40px)); background: var(--bg); z-index: 50;
    border: 1px solid var(--border); border-radius: 20px; padding: 28px;
    box-shadow: 0 20px 60px oklch(0 0 0 / 0.5);
    animation: modal-in 0.24s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes modal-in { from { transform: translate(-50%, -45%); opacity: 0; } }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 12px; color: var(--fg-3); font-weight: 500; }
  .field input, .field select {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 14px; outline: 0; color: var(--fg);
  }
  .field input:focus { border-color: var(--accent); }
  .seg { display: flex; gap: 4px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
  .seg button { flex: 1; padding: 7px 10px; border-radius: 7px; font-size: 12px; font-weight: 600; color: var(--fg-3); }
  .seg button.active { background: var(--accent); color: var(--accent-fg); }

  /* tweaks panel */
  .tweaks-fab {
    position: fixed; bottom: 24px; right: 24px; z-index: 60;
    width: 48px; height: 48px; border-radius: 14px; background: var(--card);
    border: 1px solid var(--border); box-shadow: var(--shadow);
    display: grid; place-items: center;
  }
  .tweaks-panel {
    position: fixed; bottom: 84px; right: 24px; z-index: 60;
    width: 320px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px; box-shadow: 0 20px 60px oklch(0 0 0 / 0.4);
    animation: modal-in 0.2s ease;
    max-height: 80vh; overflow-y: auto;
  }
  .tweaks-panel h4 { margin: 0 0 12px; font-size: 15px; font-weight: 600; }
  .tweak-row { margin-bottom: 14px; }
  .tweak-row .tlabel { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); font-weight: 600; margin-bottom: 6px; display: block; }
  .swatches { display: flex; gap: 6px; }
  .swatch { width: 24px; height: 24px; border-radius: 7px; border: 2px solid transparent; cursor: pointer; }
  .swatch.sel { border-color: var(--fg); }

  /* section collapse */
  .section-hidden { display: none !important; }

  /* layout B: focus */
  .layout-focus .grid-a { grid-template-columns: 1fr; }
  .layout-focus .hero-value { font-size: 72px; }
  .layout-focus .side-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--density-gap); }
  @media (max-width: 1100px) { .layout-focus .side-cards { grid-template-columns: 1fr; } }

  /* layout C: dense (density-aware) */
  .layout-dense .chart-wrap { height: 220px; }
  [data-density="compact"] .chart-wrap { height: 180px; }
  [data-density="airy"] .chart-wrap { height: 280px; }
  [data-density="compact"] .hero { padding: 16px; }
  [data-density="compact"] .hero-value { font-size: 38px; }
  [data-density="compact"] .hero-stat-value { font-size: 16px; }
  [data-density="compact"] .hero-stats { padding-top: 12px; gap: 10px; }
  [data-density="compact"] .table td { padding: 8px 10px; font-size: 12px; }
  [data-density="compact"] .tkr-avatar { width: 28px; height: 28px; font-size: 11px; }
  [data-density="compact"] .mover { padding: 7px 0; }
  [data-density="airy"] .hero { padding: 32px; }
  [data-density="airy"] .hero-value { font-size: 64px; }
  [data-density="airy"] .table td { padding: 18px 14px; }
  [data-density="airy"] .tkr-avatar { width: 38px; height: 38px; }
  [data-density="airy"] .mover { padding: 14px 0; }

  /* market view */
  .market-toolbar {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; flex-wrap: wrap;
  }
  .market-toolbar .search { padding: 8px 12px; min-width: 0; }
  .market-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip-btn {
    padding: 7px 14px; border-radius: 999px; font-size: 12px; font-weight: 500;
    color: var(--fg-2); background: transparent; border: 1px solid var(--border);
    transition: all 0.15s ease; white-space: nowrap;
  }
  .chip-btn:hover { color: var(--fg); background: var(--card-2); }
  .chip-btn.active {
    background: var(--accent); color: var(--accent-fg); border-color: transparent; font-weight: 600;
  }
  .market-table th, .market-table td { padding: 12px 14px; }
  .market-table th:first-child, .market-table td:first-child { padding-left: 16px; }
  .market-table th:last-child, .market-table td:last-child { padding-right: 16px; }
  .market-table .right { text-align: right; }
  .market-table tbody tr:hover { background: var(--card-2); }

  .pct-pill {
    display: inline-block; padding: 3px 8px; border-radius: 6px;
    font-size: 12px; font-weight: 600; min-width: 64px; text-align: center;
  }
  .pct-pill.up   { color: var(--up);   background: oklch(from var(--up) l c h / 0.12); }
  .pct-pill.down { color: var(--down); background: oklch(from var(--down) l c h / 0.12); }

  .type-badge, .owned-badge {
    display: inline-block; margin-left: 8px;
    padding: 1px 7px; border-radius: 5px;
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; vertical-align: middle;
  }
  .type-badge { color: var(--fg-3); background: var(--card-2); border: 1px solid var(--border); }
  .owned-badge { color: var(--accent-fg); background: var(--accent); }

  .add-asset-btn {
    padding: 6px 10px !important; font-size: 11px !important;
    border-radius: 8px !important;
  }
  .market-table tbody tr:hover .add-asset-btn { color: var(--fg); border-color: var(--accent); }

  [data-density="compact"] .market-toolbar { padding: 10px 12px; }
  [data-density="compact"] .market-table th, [data-density="compact"] .market-table td { padding: 8px 10px; }
  [data-density="airy"] .market-table th, [data-density="airy"] .market-table td { padding: 16px 16px; }

  /* page summary header — shared across rebalancing/allocation/forecast */
  .page-summary {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0;
    margin-bottom: var(--density-gap);
  }
  .page-summary.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .page-summary.cols-2 { grid-template-columns: 1fr 1fr; }
  .summary-cell {
    padding: 18px 22px;
    border-right: 1px solid var(--border);
  }
  .summary-cell:last-child { border-right: 0; }
  .summary-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); font-weight: 600; margin-bottom: 6px; }
  .summary-value { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
  .summary-value.up { color: var(--up); }
  .summary-value.down { color: var(--down); }
  .summary-sub { font-size: 11px; color: var(--fg-3); margin-top: 4px; }

  /* drift bar — shows actual vs target on a centered axis */
  .drift-bar {
    position: relative; height: 6px; width: 100%; min-width: 120px;
    background: var(--card-2); border-radius: 3px;
  }
  .drift-bar .axis {
    position: absolute; left: 50%; top: -2px; bottom: -2px; width: 1px;
    background: var(--border);
  }
  .drift-bar .fill {
    position: absolute; top: 0; bottom: 0; border-radius: 3px;
    transition: all 0.3s ease;
  }
  .drift-bar .fill.under { background: var(--accent); right: 50%; }
  .drift-bar .fill.over { background: oklch(0.72 0.16 60); left: 50%; }
  .drift-bar .marker {
    position: absolute; top: -3px; bottom: -3px; width: 2px;
    background: var(--fg-2); border-radius: 1px;
  }

  /* progress bar with gradient — for forecast */
  .prog-bar {
    position: relative; height: 6px; min-width: 120px;
    background: var(--card-2); border-radius: 3px; overflow: hidden;
  }
  .prog-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--accent), oklch(0.72 0.15 220));
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .prog-bar .target-tick {
    position: absolute; top: -3px; bottom: -3px; width: 2px;
    background: var(--fg); opacity: 0.4;
  }

  /* type pill (BUY/SELL) */
  .tx-type-pill {
    display: inline-block; padding: 3px 9px; border-radius: 5px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
  }
  .tx-type-pill.buy  { color: var(--up);   background: oklch(from var(--up) l c h / 0.14); }
  .tx-type-pill.sell { color: var(--down); background: oklch(from var(--down) l c h / 0.14); }

  /* small toggle switch (for rebalancing include) */
  .switch {
    position: relative; width: 36px; height: 20px;
    background: var(--card-2); border-radius: 999px; cursor: pointer;
    border: 1px solid var(--border); transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .switch::after {
    content: ""; position: absolute; top: 1px; left: 1px;
    width: 16px; height: 16px; border-radius: 50%; background: var(--fg-2);
    transition: all 0.2s ease;
  }
  .switch.on { background: var(--accent); border-color: var(--accent); }
  .switch.on::after { left: 17px; background: var(--accent-fg); }

  /* small inline number input for allocation */
  .inline-num {
    width: 64px; padding: 6px 8px; border-radius: 8px;
    background: var(--card-2); border: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--fg);
    text-align: right; outline: 0; font-variant-numeric: tabular-nums;
  }
  .inline-num:focus { border-color: var(--accent); }

  /* row icon button (edit/delete) */
  .row-icon-btn {
    width: 28px; height: 28px; display: inline-grid; place-items: center;
    border-radius: 8px; color: var(--fg-3); transition: all 0.15s ease;
  }
  .row-icon-btn:hover { background: var(--card-2); color: var(--fg); }
  .row-icon-btn.danger:hover { color: var(--down); background: oklch(from var(--down) l c h / 0.12); }

  /* page action header (toolbar inline with title row) */
  .page-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }

  /* spark */
  .spark { height: 28px; width: 80px; }

  /* heatmap */
  .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .heatmap-cell {
    aspect-ratio: 1;
    border-radius: 6px; padding: 6px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-size: 10px; color: oklch(0.98 0 0);
    cursor: pointer; position: relative;
  }
  .heatmap-cell:hover { outline: 2px solid var(--fg); }
  .heatmap-cell .sym { font-weight: 700; font-size: 11px; }
  .heatmap-cell .pct { font-weight: 600; font-size: 10px; opacity: 0.9; }

  .loader {
    position: fixed; inset: 0; background: var(--bg);
    display: grid; place-items: center; z-index: 100;
  }
  .loader .l { display: flex; gap: 6px; }
  .loader .l span { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: bounce 0.8s infinite; }
  .loader .l span:nth-child(2) { animation-delay: 0.15s; }
  .loader .l span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-8px); opacity: 1; } }

  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}

};

<script type="text/babel">// Portfolio math helpers
const fmtNum = (n, d = 2) => {
  if (n == null || isNaN(n)) return "—";
  return n.toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
};
const fmtMoney = (n, cur = "EUR", d = 2) => {
  if (n == null || isNaN(n)) return "—";
  const sym = cur === "USD" ? "$" : "€";
  return sym + fmtNum(n, d);
};
const fmtPct = (n, d = 2) => {
  if (n == null || isNaN(n)) return "—";
  const s = n >= 0 ? "+" : "";
  return s + n.toFixed(d) + "%";
};
const fmtShares = (n) => {
  if (n == null || isNaN(n)) return "—";
  if (n >= 1) return n.toLocaleString("en-US", { maximumFractionDigits: 4 });
  return n.toFixed(4);
};

// Given txns for one ticker, compute shares + avg cost (FIFO-ish avg)
function computePosition(txns) {
  let shares = 0, cost = 0;
  const sorted = [...txns].sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  for (const tx of sorted) {
    if (tx.type === "buy") {
      cost += tx.shares * tx.price;
      shares += tx.shares;
    } else if (shares > 0) {
      const avg = cost / shares;
      const s = Math.min(tx.shares, shares);
      cost -= s * avg;
      shares -= s;
    }
  }
  return { shares: Math.max(0, shares), cost: Math.max(0, cost), avgPrice: shares > 0 ? cost / shares : 0 };
}

function buildHoldings(data) {
  const { tickers = [], txns = {}, prices = {}, targets = {}, priceTgts = {} } = data;
  const total = {};
  const rows = tickers.map(t => {
    const tid = String(t.id);
    const txlist = txns[tid] || [];
    const { shares, cost, avgPrice } = computePosition(txlist);
    const price = prices[tid] || 0;
    const value = shares * price;
    const pl = value - cost;
    const plPct = cost > 0 ? (pl / cost) * 100 : 0;
    const target = targets[tid] || 0;
    const priceTgt = priceTgts[tid] || null;
    const upside = priceTgt && price ? ((priceTgt - price) / price) * 100 : null;
    return {
      id: t.id, tid, symbol: t.symbol, name: t.name, type: t.type,
      shares, cost, avgPrice, price, value, pl, plPct,
      target, priceTgt, upside, txCount: txlist.length,
    };
  });
  const portfolioValue = rows.reduce((s, r) => s + r.value, 0);
  const portfolioCost  = rows.reduce((s, r) => s + r.cost, 0);
  return {
    rows: rows.map(r => ({ ...r, actualPct: portfolioValue > 0 ? (r.value / portfolioValue) * 100 : 0 })),
    total: {
      value: portfolioValue,
      cost: portfolioCost,
      pl: portfolioValue - portfolioCost,
      plPct: portfolioCost > 0 ? ((portfolioValue - portfolioCost) / portfolioCost) * 100 : 0,
    },
  };
}

function dayChange(history) {
  if (!history || history.length < 2) return { abs: 0, pct: 0 };
  const last = history[history.length - 1].v;
  const lastDate = history[history.length - 1].t.slice(0, 10);
  // find first point from current day; if none, take yesterday's last
  let prev = null;
  for (let i = history.length - 2; i >= 0; i--) {
    if (history[i].t.slice(0, 10) !== lastDate) { prev = history[i].v; break; }
  }
  if (prev == null) prev = history[0].v;
  return { abs: last - prev, pct: prev > 0 ? ((last - prev) / prev) * 100 : 0 };
}

function filterHistory(history, range) {
  if (!history || !history.length) return [];
  const last = new Date(history[history.length - 1].t);
  const cutoff = new Date(last);
  switch (range) {
    case "1D": {
      const day = history[history.length - 1].t.slice(0, 10);
      return history.filter(h => h.t.slice(0, 10) === day);
    }
    case "1W": cutoff.setDate(cutoff.getDate() - 7); break;
    case "1M": cutoff.setMonth(cutoff.getMonth() - 1); break;
    case "YTD": cutoff.setMonth(0); cutoff.setDate(1); break;
    case "1Y": cutoff.setFullYear(cutoff.getFullYear() - 1); break;
    default: return history;
  }
  return history.filter(h => new Date(h.t) >= cutoff);
}

// deterministic color per ticker
function tickerColor(symbol) {
  let h = 0;
  for (let i = 0; i < symbol.length; i++) h = (h * 31 + symbol.charCodeAt(i)) & 0xffff;
  const hue = h % 360;
  return `oklch(0.62 0.16 ${hue})`;
}

function typeLabel(t, lang) {
  if (lang === "uk") return { etf: "ETF", stock: "Акція", crypto: "Крипто" }[t] || t;
  return { etf: "ETF", stock: "Stock", crypto: "Crypto" }[t] || t;
}

Object.assign(window, {
  fmtNum, fmtMoney, fmtPct, fmtShares,
  computePosition, buildHoldings, dayChange, filterHistory,
  tickerColor, typeLabel,
});
</script>
<script type="text/babel">// SVG line/area/candlestick chart with hover scrub
const Chart = ({ history, style = "area", height = 260, onHover, fill = false }) => {
  const [hover, setHover] = React.useState(null);
  const ref = React.useRef(null);
  const [w, setW] = React.useState(600);
  const [h, setH] = React.useState(height);

  React.useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(e => {
      setW(e[0].contentRect.width);
      if (fill) setH(e[0].contentRect.height);
    });
    ro.observe(ref.current);
    return () => ro.disconnect();
  }, [fill]);

  const H = fill ? h : height;

  if (!history || history.length < 2) {
    return <div ref={ref} style={{ height: fill ? "100%" : height, width: "100%", display: "grid", placeItems: "center", color: "var(--fg-3)", fontSize: 13 }}>No chart data</div>;
  }

  const padT = 14, padB = 22, padL = 50, padR = 10;
  const innerW = Math.max(10, w - padL - padR);
  const innerH = Math.max(10, H - padT - padB);
  const values = history.map(h => h.v);
  const rawMin = Math.min(...values);
  const rawMax = Math.max(...values);
  const rawRange = rawMax - rawMin || 1;
  // add 8% headroom above and 4% below so the series doesn't kiss the edges
  const min = rawMin - rawRange * 0.04;
  const max = rawMax + rawRange * 0.08;
  const range = max - min || 1;
  const xStep = innerW / (history.length - 1);

  const x = i => padL + i * xStep;
  const y = v => padT + innerH - ((v - min) / range) * innerH;

  // Line path
  const linePath = history.map((h, i) => `${i === 0 ? "M" : "L"}${x(i).toFixed(1)},${y(h.v).toFixed(1)}`).join(" ");
  const areaPath = linePath + ` L${x(history.length - 1).toFixed(1)},${padT + innerH} L${padL},${padT + innerH} Z`;

  // First value = baseline for up/down coloring
  const first = history[0].v;
  const last = history[history.length - 1].v;
  const up = last >= first;
  const col = up ? "var(--up)" : "var(--down)";

  // Y axis ticks — now 5 ticks instead of 4 so we get an extra dashed line up top
  const ticks = 5;
  const tickVals = Array.from({ length: ticks + 1 }, (_, i) => min + (range * i) / ticks);

  // Candlestick: group into ~30 buckets
  let candles = null;
  if (style === "candlestick") {
    const n = Math.min(60, Math.floor(history.length / 2));
    const bucket = Math.ceil(history.length / n);
    candles = [];
    for (let i = 0; i < history.length; i += bucket) {
      const slice = history.slice(i, i + bucket);
      if (!slice.length) continue;
      const o = slice[0].v, c = slice[slice.length - 1].v;
      const h = Math.max(...slice.map(s => s.v));
      const l = Math.min(...slice.map(s => s.v));
      candles.push({ i: i + slice.length / 2, o, c, h, l });
    }
  }

  const handleMove = e => {
    const rect = e.currentTarget.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const idx = Math.max(0, Math.min(history.length - 1, Math.round((px - padL) / xStep)));
    setHover(idx);
    onHover?.(history[idx]);
  };
  const handleLeave = () => { setHover(null); onHover?.(null); };

  const hv = hover != null ? history[hover] : null;

  return (
    <div ref={ref} className="chart-wrap" style={{ height: fill ? "100%" : H, width: "100%" }}>
      <svg onMouseMove={handleMove} onMouseLeave={handleLeave} width="100%" height="100%">
        <defs>
          <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={col} stopOpacity="0.25"/>
            <stop offset="100%" stopColor={col} stopOpacity="0"/>
          </linearGradient>
        </defs>

        {/* grid */}
        {tickVals.map((v, i) => (
          <g key={i}>
            <line x1={padL} x2={padL + innerW} y1={y(v)} y2={y(v)}
                  stroke="var(--border)" strokeDasharray="3 5" strokeWidth="1"/>
            <text x={padL - 8} y={y(v) + 3} textAnchor="end" fontSize="10" fill="var(--fg-3)" className="mono">
              €{v >= 1000 ? (v / 1000).toFixed(1) + "k" : v.toFixed(0)}
            </text>
          </g>
        ))}

        {/* area/line */}
        {(style === "area" || style === "line") && (
          <>
            {style === "area" && <path d={areaPath} fill="url(#chartGrad)" />}
            <path d={linePath} fill="none" stroke={col} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
          </>
        )}

        {/* candles */}
        {candles && candles.map((c, i) => {
          const cx = x(c.i);
          const isUp = c.c >= c.o;
          const cCol = isUp ? "var(--up)" : "var(--down)";
          const ww = Math.max(2, (innerW / candles.length) * 0.55);
          return (
            <g key={i}>
              <line x1={cx} x2={cx} y1={y(c.h)} y2={y(c.l)} stroke={cCol} strokeWidth="1"/>
              <rect x={cx - ww/2} y={y(Math.max(c.o, c.c))} width={ww}
                    height={Math.max(1, Math.abs(y(c.o) - y(c.c)))} fill={cCol}/>
            </g>
          );
        })}

        {/* hover marker */}
        {hv && (
          <g>
            <line x1={x(hover)} x2={x(hover)} y1={padT} y2={padT + innerH}
                  stroke="var(--fg)" strokeWidth="1" strokeDasharray="2 3" opacity="0.5"/>
            <circle cx={x(hover)} cy={y(hv.v)} r="5" fill={col}/>
            <circle cx={x(hover)} cy={y(hv.v)} r="9" fill={col} opacity="0.2"/>
          </g>
        )}

        {/* x labels */}
        {[0, Math.floor(history.length / 2), history.length - 1].map(i => (
          <text key={i} x={x(i)} y={padT + innerH + 16} textAnchor={i === 0 ? "start" : i === history.length - 1 ? "end" : "middle"}
                fontSize="10" fill="var(--fg-3)">
            {formatDate(history[i].t)}
          </text>
        ))}
      </svg>

      {hv && (
        <div className="chart-tooltip mono" style={{ left: `${x(hover)}px`, top: `${y(hv.v)}px` }}>
          <div className="t">{formatDate(hv.t, true)}</div>
          <div className="v">€{hv.v.toLocaleString("en-US", { maximumFractionDigits: 2 })}</div>
        </div>
      )}
    </div>
  );
};

function formatDate(t, full = false) {
  const d = new Date(t);
  if (full) return d.toLocaleString("en-GB", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" });
}

// Sparkline
const Spark = ({ values, width = 80, height = 28, color }) => {
  if (!values || values.length < 2) return <svg width={width} height={height}/>;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const step = width / (values.length - 1);
  const path = values.map((v, i) => `${i === 0 ? "M" : "L"}${(i * step).toFixed(1)},${(height - ((v - min) / range) * height).toFixed(1)}`).join(" ");
  const up = values[values.length - 1] >= values[0];
  return (
    <svg width={width} height={height} className="spark">
      <path d={path} fill="none" stroke={color || (up ? "var(--up)" : "var(--down)")} strokeWidth="1.5" strokeLinecap="round"/>
    </svg>
  );
};

// Donut
const Donut = ({ data, size = 160, thickness = 22 }) => {
  const total = data.reduce((s, d) => s + d.value, 0);
  const R = size / 2;
  const r = R - thickness / 2;
  const C = 2 * Math.PI * r;
  let acc = 0;
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={R} cy={R} r={r} fill="none" stroke="var(--card-2)" strokeWidth={thickness}/>
        {data.map((d, i) => {
          const len = total > 0 ? (d.value / total) * C : 0;
          const off = acc;
          acc += len;
          return (
            <circle key={i} cx={R} cy={R} r={r}
              fill="none" stroke={d.color} strokeWidth={thickness}
              strokeDasharray={`${len} ${C - len}`} strokeDashoffset={-off}
              strokeLinecap="butt"/>
          );
        })}
      </svg>
    </div>
  );
};

Object.assign(window, { Chart, Spark, Donut, formatDate });
</script>
<script type="text/babel">// Ticker tape — scrolling market prices
const TickerTape = ({ rows, currency, eurusd }) => {
  const fx = currency === "USD" ? eurusd : 1;
  const items = rows.slice(0, 18);
  const render = (list, keyPrefix) => list.map((r, i) => {
    const up = r.plPct >= 0;
    return (
      <div key={keyPrefix + i} className="ticker-item">
        <span className="ticker-sym">{r.symbol}</span>
        <span className="ticker-price">{fmtMoney(r.price * fx, currency)}</span>
        <span className={"ticker-chg " + (up ? "up" : "down")}>{up ? "▲" : "▼"} {fmtPct(r.plPct, 2)}</span>
      </div>
    );
  });
  return (
    <div className="ticker-tape">
      <div className="ticker-track">
        {render(items, "a-")}
        {render(items, "b-")}
      </div>
    </div>
  );
};

window.TickerTape = TickerTape;
</script>

const Hero = ({ total, dayCh, currency, eurusd, lang, layout, hovered }) => {
  const t = T[lang];
  const cur = currency;
  const fx = cur === "USD" ? eurusd : 1;
  const val = hovered ? hovered.v * fx : total.value * fx;
  const dayAbs = dayCh.abs * fx;
  const up = dayCh.pct >= 0;
  const plUp = total.pl >= 0;
  return (
    <div className="hero">
      <div>
        <div className="hero-label">{t.totalValue}</div>
        <div className="hero-value num">
          <span className="cur">{cur === "USD" ? "$" : "€"}</span>
          {val.toLocaleString("en-US", { maximumFractionDigits: 0 })}
          <span style={{ fontSize: "0.4em", color: "var(--fg-3)", marginLeft: 8 }}>
            .{(val % 1).toFixed(2).slice(2)}
          </span>
        </div>
        <div className="hero-delta">
          <span className={"pill " + (up ? "up" : "down")}>
            <Icon name={up ? "up" : "down"} size={12}/>
            {fmtPct(dayCh.pct)}
          </span>
          <span style={{ color: up ? "var(--up)" : "var(--down)", fontWeight: 600 }}>
            {up ? "+" : ""}{fmtMoney(dayAbs, cur)}
          </span>
          <span style={{ color: "var(--fg-3)", fontSize: 13 }}>{hovered ? formatDate(hovered.t, true) : t.today}</span>
        </div>
      </div>
      <div className="hero-stats">
        <div>
          <div className="hero-stat-label">{t.invested}</div>
          <div className="hero-stat-value num">{fmtMoney(total.cost * fx, cur, 0)}</div>
        </div>
        <div>
          <div className="hero-stat-label">{t.unrealized}</div>
          <div className="hero-stat-value num" style={{ color: plUp ? "var(--up)" : "var(--down)" }}>
            {plUp ? "+" : ""}{fmtMoney(total.pl * fx, cur, 0)}
          </div>
          <div className="hero-stat-sub">{fmtPct(total.plPct)}</div>
        </div>
        <div>
          <div className="hero-stat-label">{t.positions}</div>
          <div className="hero-stat-value num">21</div>
          <div className="hero-stat-sub">3 ETF · 16 stocks · 1 crypto</div>
        </div>
      </div>
    </div>
  );
};

const ChartCard = ({ history, range, setRange, chartStyle, lang, onHover }) => {

const Holdings = ({ rows, currency, eurusd, lang, onSelect, query, setQuery, onAddTx, embedded, sortKey, sortDir, onSort }) => {
  const t = T[lang];
  const fx = currency === "USD" ? eurusd : 1;
  const filtered = rows;

  const head = (key, label, right = false) => (
    <th className={sortKey === key ? "sorted" : ""} style={{ textAlign: right ? "right" : "left" }}
        onClick={() => onSort(key)}>
      {label}
      <span className="arrow">{sortKey === key ? (sortDir === "asc" ? "↑" : "↓") : "↕"}</span>
    </th>
  );

  const header = (
    <div className="card-header" style={{ alignItems: "center" }}>
      <div>
        <h3>{t.topHoldings}</h3>
        <div className="card-sub">{filtered.length} {t.positions.toLowerCase()}</div>
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginLeft: "auto" }}>
        {setQuery && (
          <div className="search" style={{ minWidth: 200, padding: "7px 12px" }}>
            <Icon name="search" size={14}/>
            <input placeholder={t.search} value={query} onChange={e => setQuery(e.target.value)}/>
          </div>
        )}
        {onAddTx && (
          <button className="btn-primary" onClick={onAddTx} style={{ padding: "8px 14px" }}>
            <Icon name="plus" size={14}/>
            <span>{t.addTx}</span>
          </button>
        )}
      </div>
    </div>
  );

  const body = (
    <div style={{ overflowX: "auto" }}>
      <table className="table">
        <thead>
          <tr>
            {head("symbol", t.symbol)}
            {head("shares", t.shares, true)}
            {head("avgPrice", t.avgPrice, true)}
            {head("price", t.price, true)}
            {head("value", t.value, true)}
            {head("plPct", t.pl, true)}
          </tr>
        </thead>
        <tbody>
          {filtered.map(r => {
            const up = r.pl >= 0;
            return (
              <tr key={r.id} onClick={() => onSelect(r)}>
                <td>
                  <div className="tkr">
                    <div className="tkr-avatar" style={{ background: tickerColor(r.symbol) }}>{r.symbol.slice(0, 2)}</div>
                    <div>
                      <div className="tkr-name">{r.symbol}</div>
                      <div className="tkr-sub">{r.name}</div>
                    </div>
                  </div>
                </td>
                <td className="right mono nowrap">{fmtShares(r.shares)}</td>
                <td className="right mono nowrap">{fmtMoney(r.avgPrice * fx, currency)}</td>
                <td className="right mono nowrap">{fmtMoney(r.price * fx, currency)}</td>
                <td className="right mono nowrap" style={{ fontWeight: 600 }}>{fmtMoney(r.value * fx, currency)}</td>
                <td className="right mono nowrap" style={{ color: up ? "var(--up)" : "var(--down)", fontWeight: 600 }}>
                  <div>{up ? "+" : ""}{fmtMoney(r.pl * fx, currency, 0)}</div>
                  <div style={{ fontSize: 11, opacity: 0.85 }}>{fmtPct(r.plPct)}</div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );

  if (embedded) return <>{header}{body}</>;
  return <div className="card">{header}{body}</div>;
};

const AllocationCard = ({ rows, total, lang, viz, currency, eurusd, embedded, aligned }) => {
  const t = T[lang];
  const fx = currency === "USD" ? eurusd : 1;
  // If aligned=true: use rows as given (same order as Holdings). Else sort.
  const data = (aligned ? rows : [...rows].sort((a, b) => b.actualPct - a.actualPct))
    .map(r => ({ ...r, color: tickerColor(r.symbol) }));

  let inner;
  if (viz === "donut") {
    inner = (
      <div className="donut-wrap">
        <div style={{ position: "relative" }}>
          <Donut data={data.map(d => ({ value: d.value, color: d.color }))} size={180}/>
          <div className="donut-center">
            <div>
              <div className="big num">{fmtMoney(total.value * fx, currency, 0)}</div>
              <div className="small">{data.length} {t.positions.toLowerCase()}</div>
            </div>
          </div>
        </div>
        <div style={{ flex: 1, minWidth: 180, display: "flex", flexDirection: "column", gap: 6 }}>
          {data.slice(0, 8).map(d => (
            <div key={d.id} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
              <div style={{ width: 8, height: 8, borderRadius: 3, background: d.color, flexShrink: 0 }}/>
              <span style={{ fontWeight: 500 }}>{d.symbol}</span>
              <span style={{ marginLeft: "auto", color: "var(--fg-3)" }} className="mono">{d.actualPct.toFixed(1)}%</span>
            </div>
          ))}
        </div>
      </div>
    );
  } else if (viz === "heatmap") {
    inner = (
      <div className="heatmap-grid">
        {data.map(d => {
          const isUp = d.plPct >= 0;
          const intensity = Math.min(1, Math.abs(d.plPct) / 50);
          const bg = isUp
            ? `oklch(${0.35 + 0.3 * intensity} 0.15 155)`
            : `oklch(${0.35 + 0.3 * intensity} 0.17 25)`;
          return (
            <div key={d.id} className="heatmap-cell" style={{ background: bg, gridColumn: `span ${Math.max(1, Math.ceil(d.actualPct / 3))}` }}>
              <div className="sym">{d.symbol}</div>
              <div className="pct">{fmtPct(d.plPct, 1)}</div>
            </div>
          );
        })}
      </div>
    );
  } else {
    const maxPctAll = Math.max(...data.map(d => Math.max(d.actualPct, d.target)), 1);
    inner = (
      <div className={aligned ? "alloc-aligned" : ""}>
        {aligned && (
          <div className="alloc-thead">
            <span>{t.actual} / {t.target}</span>
            <span>%</span>
          </div>
        )}
        {data.map(d => {
          const fillPct = (d.actualPct / maxPctAll) * 100;
          const targetPos = (d.target / maxPctAll) * 100;
          const over = d.target > 0 && d.actualPct > d.target * 1.2;
          const under = d.target > 0 && d.actualPct < d.target * 0.8;
          return (
            <div className={aligned ? "aligned-row" : "alloc-row"} key={d.id}>
              {!aligned && (
                <div className="alloc-label">
                  <span className="chip" style={{ background: d.color }}/>
                  <span>{d.symbol}</span>
                </div>
              )}
              <div className="alloc-bar">
                <div className={"alloc-fill " + (over ? "over" : under ? "under" : "")} style={{ width: fillPct + "%", background: aligned ? d.color : undefined }}/>
                {d.target > 0 && <div className="alloc-target" style={{ left: targetPos + "%" }}/>}
              </div>
              <div className="alloc-nums">
                <div className="big mono">{d.actualPct.toFixed(1)}%</div>
                <div className="small mono">/ {d.target.toFixed(1)}%</div>
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  const header = (
    <div className="card-header">
      <div>
        <h3>{t.allocation_title}</h3>
        {viz === "bars" && <div className="card-sub">{t.target} vs {t.actual.toLowerCase()}</div>}
      </div>
    </div>
  );

  if (embedded) return <>{header}{inner}</>;
  return <div className="card">{header}{inner}</div>;
};

const Movers = ({ rows, lang, onSelect, currency, eurusd }) => {
  const t = T[lang];
  const fx = currency === "USD" ? eurusd : 1;
  // sort by plPct
  const sorted = [...rows].sort((a, b) => b.plPct - a.plPct);
  const up = sorted.slice(0, 5);
  const down = sorted.slice(-5).reverse();

  const render = (list, label) => (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0 }}>
      <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.06em", color: "var(--fg-3)", fontWeight: 600, marginBottom: 6 }}>{label}</div>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "space-between" }}>
        {list.map(r => {
          const isUp = r.plPct >= 0;
          return (
            <div className="mover" key={r.id} onClick={() => onSelect(r)} style={{ cursor: "pointer" }}>
              <div className="tkr-avatar" style={{ background: tickerColor(r.symbol) }}>{r.symbol.slice(0, 2)}</div>
              <div className="mover-info">
                <div className="mover-sym">{r.symbol}</div>
                <div className="mover-name">{r.name}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div className="mono" style={{ fontSize: 12, fontWeight: 600 }}>{fmtMoney(r.price * fx, currency)}</div>
                <div className="mono" style={{ fontSize: 11, color: isUp ? "var(--up)" : "var(--down)", fontWeight: 600 }}>
                  {fmtPct(r.plPct)}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  return (
    <div className="card" style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      <div className="card-header"><div><h3>{t.movers}</h3></div></div>
      <div style={{ display: "flex", flexDirection: "column", gap: 16, flex: 1, minHeight: 0 }}>
        {render(up, t.up)}
        {render(down, t.down)}
      </div>
    </div>
  );
};

const AssetPanel = ({ row, data, onClose, currency, eurusd, lang }) => {

  const fx = currency === "USD" ? eurusd : 1;
  if (!row) return null;
  const up = row.pl >= 0;
  const txns = (data.txns[row.tid] || []).slice().sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  const upsideUp = row.upside != null && row.upside >= 0;

  return (
    <>
      <div className="overlay" onClick={onClose}/>
      <div className="panel">
        <button className="icon-btn panel-close" onClick={onClose}><Icon name="x"/></button>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 4 }}>
          <div className="tkr-avatar" style={{ background: tickerColor(row.symbol), width: 48, height: 48, fontSize: 15 }}>
            {row.symbol.slice(0, 2)}
          </div>
          <div>
            <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: "-0.01em" }}>{row.symbol}</div>
            <div style={{ fontSize: 13, color: "var(--fg-3)" }}>{row.name} · {typeLabel(row.type)}</div>
          </div>
        </div>

        <div style={{ marginTop: 24, padding: "20px 0", borderTop: "1px solid var(--border)", borderBottom: "1px solid var(--border)" }}>

          <div className="num" style={{ fontSize: 34, fontWeight: 700, letterSpacing: "-0.02em" }}>{fmtMoney(row.value * fx, currency)}</div>
          <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 10 }}>
            <span className={"pill " + (up ? "up" : "down")}>{up ? "+" : ""}{fmtMoney(row.pl * fx, currency, 0)}</span>
            <span style={{ color: up ? "var(--up)" : "var(--down)", fontWeight: 600, fontSize: 13 }}>{fmtPct(row.plPct)}</span>

        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginTop: 18 }}>
          <Stat label={t.shares} value={fmtShares(row.shares)}/>
          <Stat label={t.avgPrice} value={fmtMoney(row.avgPrice * fx, currency)}/>
          <Stat label={t.price} value={fmtMoney(row.price * fx, currency)}/>
          <Stat label={t.cost} value={fmtMoney(row.cost * fx, currency, 0)}/>
          {row.priceTgt && <Stat label={t.priceTarget} value={fmtMoney(row.priceTgt * fx, currency)}/>}
          {row.upside != null && <Stat label={t.upside}
                       value={(upsideUp ? "+" : "") + row.upside.toFixed(1) + "%"}
                       color={upsideUp ? "var(--up)" : "var(--down)"}/>}
        </div>

        <h4 style={{ marginTop: 28, marginBottom: 10, fontSize: 13, fontWeight: 600 }}>{t.recent}</h4>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {txns.slice(0, 12).map(tx => (
            <div key={tx.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", background: "var(--card)", borderRadius: 10 }}>
              <div className="pill" style={{ background: tx.type === "buy" ? "var(--up-dim)" : "var(--down-dim)", color: tx.type === "buy" ? "var(--up)" : "var(--down)" }}>
                {tx.type === "buy" ? t.buy : t.sell}
              </div>
              <div style={{ fontSize: 12, color: "var(--fg-3)" }}>{tx.date?.slice(0, 10)}</div>
              <div style={{ marginLeft: "auto", textAlign: "right" }}>
                <div className="mono" style={{ fontSize: 12, fontWeight: 600 }}>{fmtShares(tx.shares)} @ {fmtMoney(tx.price * fx, currency)}</div>
                <div className="mono" style={{ fontSize: 11, color: "var(--fg-3)" }}>{fmtMoney(tx.shares * tx.price * fx, currency, 0)}</div>
              </div>
            </div>
          ))}
          {txns.length === 0 && <div style={{ color: "var(--fg-3)", fontSize: 13 }}>No transactions yet.</div>}
        </div>
      </div>
    </>
  );
};

);
